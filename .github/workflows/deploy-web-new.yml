name: Deploy Web to new.parvaly.com

# Builds the Astro marketing site in web/ and deploys to new.parvaly.com via FTP.
#
# Required GitHub secrets:
#   FTP_SERVER    — FTP host (e.g. ftp.parvaly.com)
#   FTP_USERNAME  — FTP username
#   FTP_PASSWORD  — FTP password

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-new.yml'
  workflow_dispatch:

concurrency:
  group: deploy-ftp-new
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy to new.parvaly.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Deploy to new.parvaly.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./web/dist/
          server-dir: /domains/parvaly.com/public_html/new/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
