name: Deploy Web to new.parvaly.com

# Builds the Astro marketing site in web/ and deploys to new.parvaly.com via FTP.
#
# Required GitHub secrets:
#   FTP_SERVER    — FTP host (e.g. ftp.parvaly.com)
#   FTP_USERNAME  — FTP username
#   FTP_PASSWORD  — FTP password

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-new.yml'
  workflow_dispatch:

concurrency:
  group: deploy-ftp-new
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy to new.parvaly.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to new.parvaly.com via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://$SFTP_USER:$SFTP_PASS@$SFTP_HOST:65002;
            mirror -R --no-perms --parallel=4 ./web/dist/ /new/;
            quit
          "
