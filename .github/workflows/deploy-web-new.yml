name: Deploy Web to new.parvaly.com

# Builds the Astro marketing site in web/ and deploys to new.parvaly.com subdomain.
# Triggers on push to any branch touching web/ (not just main), so you can preview
# changes on the subdomain before merging.
#
# Required GitHub secrets (same SSH key as existing deploy):
#   HOSTINGER_SSH_KEY   — private SSH key for Hostinger
#   HOSTINGER_HOST      — SSH host (e.g. ssh.hostinger.com or server IP)
#   HOSTINGER_PORT      — SSH port (usually 65002 on Hostinger)
#   HOSTINGER_USER      — SSH username
#   HOSTINGER_NEW_DIR   — absolute path to new.parvaly.com docroot,
#                         e.g. /home/uXXXX/domains/parvaly.com/public_html/new.parvaly.com

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-new.yml'
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-new
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy to new.parvaly.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Deploy to new.parvaly.com via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} -H ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            web/dist/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_NEW_DIR }}/
